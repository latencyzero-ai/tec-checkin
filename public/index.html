<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Enlightenment Church — Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0A0A0A;
    --gold:#D4AF37;
    --gold-soft:#F2D578;
    --gold-bright:#FFC300;
    --flame:#FF7A1A;
    --ink:#F7F3EA;
    --muted:rgba(247,243,234,.62);
    --line:rgba(212,175,55,.22);
    --font-display:'Fraunces',Georgia,serif;
    --font-body:'Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--black);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100dvh;
    display:flex;flex-direction:column;
    overflow-x:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- video / atmosphere layer ---- */
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--black);}
  .bg video{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;opacity:0;transition:opacity 1.2s ease;
  }
  .bg video.live{opacity:.5;}
  /* scrim keeps text legible + ties video to brand black/gold */
  .scrim{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(212,175,55,.10) 0%, rgba(10,10,10,0) 45%),
      linear-gradient(180deg, rgba(10,10,10,.55) 0%, rgba(10,10,10,.78) 55%, rgba(10,10,10,.96) 100%);
  }
  /* plain (no-video) meetings get a quiet gold ember glow instead */
  body.plain .scrim{
    background:
      radial-gradient(90% 60% at 50% -10%, rgba(212,175,55,.14) 0%, rgba(10,10,10,0) 50%),
      linear-gradient(180deg, rgba(10,10,10,.7) 0%, var(--black) 70%);
  }

  /* ---- content ---- */
  .wrap{
    position:relative;z-index:2;
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;
    padding:max(40px,env(safe-area-inset-top)) 26px max(36px,env(safe-area-inset-bottom));
    gap:0;
  }

  .logo{
    width:clamp(108px,32vw,148px);height:auto;
    filter:drop-shadow(0 8px 38px rgba(212,175,55,.32));
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) both;
  }
  .eyebrow{
    margin-top:26px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:clamp(11px,3vw,13px);
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--gold-soft);
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) 80ms both;
  }
  h1{
    margin-top:10px;
    font-family:var(--font-display);
    font-weight:500;
    font-size:clamp(34px,9.5vw,52px);
    line-height:1.02;
    letter-spacing:-.01em;
    color:var(--ink);
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) 140ms both;
  }
  .meeting{
    display:block;
    margin-top:18px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:clamp(19px,5.4vw,26px);
    line-height:1.18;
    color:var(--gold-bright);
    text-wrap:balance;
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) 200ms both;
  }
  .status{
    margin-top:16px;max-width:30ch;
    font-size:clamp(14px,3.8vw,15.5px);
    line-height:1.55;color:var(--muted);
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) 260ms both;
  }
  .status strong{color:var(--ink);font-weight:600;}

  /* ---- action button (the signature) ---- */
  .action{
    margin-top:34px;width:100%;max-width:380px;
    position:relative;
    border:none;border-radius:18px;cursor:pointer;
    padding:20px 28px;
    font-family:var(--font-body);
    font-size:17px;font-weight:700;letter-spacing:.01em;
    color:#1A1303;
    background:linear-gradient(135deg,var(--gold-soft) 0%,var(--gold-bright) 48%,var(--gold) 100%);
    box-shadow:0 12px 40px rgba(212,175,55,.30),inset 0 1px 0 rgba(255,255,255,.5);
    overflow:hidden;
    transition:transform .15s ease,box-shadow .25s ease,background .3s ease;
    display:none;
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) 320ms both;
  }
  .action::after{
    content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-18deg);
    animation:sheen 4.5s ease-in-out infinite;
  }
  .action:active{transform:scale(.985);}
  .action:disabled{opacity:.8;cursor:default;}
  .action.checkout{
    background:linear-gradient(135deg,#3a3320 0%,#2a2515 100%);
    color:var(--gold-soft);
    box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 0 0 1px var(--line);
  }
  .action.checkout::after{display:none;}

  .hint{
    margin-top:18px;max-width:30ch;
    font-size:12.5px;line-height:1.5;color:rgba(247,243,234,.4);
    animation:rise 1000ms cubic-bezier(.2,.7,.2,1) 380ms both;
  }

  .banner{
    margin-top:22px;width:100%;max-width:380px;
    border-radius:14px;padding:0 18px;
    font-size:14.5px;line-height:1.5;
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .4s ease,opacity .4s ease,padding .4s ease;
    border:1px solid transparent;
  }
  .banner.show{max-height:200px;opacity:1;padding:15px 18px;}
  .banner.in{background:rgba(212,175,55,.12);border-color:var(--line);color:var(--gold-soft);}
  .banner.out{background:rgba(247,243,234,.06);border-color:rgba(247,243,234,.14);color:var(--ink);}
  .banner.err{background:rgba(255,80,40,.10);border-color:rgba(255,80,40,.3);color:#ffb9a3;}

  .foot{
    position:relative;z-index:2;
    text-align:center;padding:0 0 max(20px,env(safe-area-inset-bottom));
    font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(247,243,234,.28);
  }

  .spinner{
    display:inline-block;width:15px;height:15px;margin-right:9px;vertical-align:-2px;
    border:2px solid rgba(26,19,3,.35);border-top-color:#1A1303;border-radius:50%;
    animation:spin .7s linear infinite;
  }
  .action.checkout .spinner{border-color:rgba(242,213,120,.3);border-top-color:var(--gold-soft);}

  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes sheen{0%,55%{left:-60%;}80%,100%{left:140%;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
    .bg video.live{opacity:.5;}
  }
</style>
</head>

    <p class="eyebrow">The Enlightenment Church</p>
    <h1>Meeting Check-in</h1>
    <span class="meeting" id="meetingLabel">Loading…</span>
    <p class="status" id="status">Checking your link…</p>
    <button class="action" id="actionBtn">Check In</button>
    <div class="banner" id="banner"></div>
    <p class="hint" id="hint">Tap once to check in. Tap again to check out if you leave early.</p>
  </main>

  <footer class="foot">Powered by The Enlightenment Church</footer>

  <script>
    const qs = new URLSearchParams(location.search);
    const SESSION_CODE = qs.get("session");
    const ID = qs.get("id");
    const SIG = qs.get("sig");

    // Map known meetings -> background videos. Custom meetings stay plain.
    const VIDEO_MAP = {
      "School of Kingdom Leadership": "/skl.mp4",
      "Daily Intercessory Prayers": "/dip.mp4",
      "Pre-Service Prayers": "/psp.mp4"
    };

    const els = {
      meeting: document.getElementById("meetingLabel"),
      status: document.getElementById("status"),
      action: document.getElementById("actionBtn"),
      banner: document.getElementById("banner"),
      hint: document.getElementById("hint"),
      video: document.getElementById("bgVideo"),
    };

    function showBanner(kind, html){ els.banner.className="banner show "+kind; els.banner.innerHTML=html; }

    function setAtmosphere(meetingName){
      const src = VIDEO_MAP[meetingName];
      if(src){
        els.video.src = src;
        els.video.play().then(()=>{ els.video.classList.add("live"); }).catch(()=>{
          // autoplay blocked or video missing -> fall back to plain
          document.body.classList.add("plain");
        });
        // if the file 404s, fall back gracefully
        els.video.addEventListener("error", ()=>{ document.body.classList.add("plain"); }, {once:true});
      } else {
        document.body.classList.add("plain");
      }
    }

    async function init(){
      if(!SESSION_CODE || !ID || !SIG){
        document.body.classList.add("plain");
        els.meeting.textContent = "—";
        els.status.innerHTML = "This isn't a valid check-in link. Please use the <strong>personal link</strong> the bot sent you in Telegram.";
        els.hint.style.display = "none";
        return;
      }
      let meetingName = SESSION_CODE;
      try {
        const m = await fetch("/api/meeting?session=" + encodeURIComponent(SESSION_CODE)).then(r=>r.json());
        if (m && m.found && m.meeting_name) meetingName = m.meeting_name;
      } catch(e) {}
      els.meeting.textContent = meetingName;
      els.status.innerHTML = `The meeting is open. Tap below to record your attendance.`;
      els.action.style.display = "block";
      setAtmosphere(meetingName);
    }

    async function submit(){
      els.action.disabled = true;
      els.action.innerHTML = '<span class="spinner"></span>Recording…';
      try{
        const res = await fetch("/api/checkin",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({session_code:SESSION_CODE, id:ID, sig:SIG})
        }).then(r=>r.json());

        if(res.action==="checkin"){
          showBanner("in", `🔥 <strong>${res.message}</strong>`);
          els.action.textContent="Check Out"; els.action.classList.add("checkout");
        } else if(res.action==="checkout"){
          showBanner("out", `${res.message}`);
          els.action.textContent="Check In"; els.action.classList.remove("checkout");
        } else {
          showBanner("err", res.message || "Something went wrong.");
          els.action.textContent="Check In";
        }
      }catch(e){
        showBanner("err","Network error. Please try again.");
        els.action.textContent="Check In";
      }finally{
        els.action.disabled=false;
      }
    }

    els.action.addEventListener("click", submit);
    init();
